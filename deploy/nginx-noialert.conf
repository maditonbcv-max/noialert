# noialert: 発信サイト(静的) + Bot API を1サブドメインで配信
#   既存の nginx に server ブロックを追加する形（他サイトには影響しない）。
#   certbot --nginx -d alert.md-tn.com が後から TLS(443) と HTTP→HTTPS を追記する。
#
# 配置:
#   /etc/nginx/sites-available/noialert に置き、sites-enabled へシンボリックリンク
#   server_name を自分のサブドメインに合わせること（既定: alert.md-tn.com）。

server {
    listen 80;
    listen [::]:80;
    server_name alert.md-tn.com;

    root /opt/noialert/app/web;
    index index.html;

    # API は Bot(localhost:3000) へ中継。Web と同一オリジンになり CORS 不要。
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:3000;
    }

    # それ以外は静的サイト(web/)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

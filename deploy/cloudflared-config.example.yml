# Cloudflare Named Tunnel 設定の雛形 (VPS の ~/.cloudflared/config.yml に配置)
# <TUNNEL_ID> と api.example.com を自分の値に置き換える。
#   - <TUNNEL_ID>          : `cloudflared tunnel create noialert` で表示されるUUID
#   - credentials-file     : 同コマンドが生成する <TUNNEL_ID>.json のパス
#   - hostname             : 公開したいサブドメイン (例 api.あなたのドメイン)
#   - service              : Bot API のローカル待受 (PORT=3000)

tunnel: <TUNNEL_ID>
credentials-file: /home/noialert/.cloudflared/<TUNNEL_ID>.json

ingress:
  - hostname: api.example.com
    service: http://localhost:3000
  # 上記に一致しないリクエストは404
  - service: http_status:404
